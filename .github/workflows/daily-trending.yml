name: Daily GitHub Trending PushPlus

on:
  schedule:
    # GitHub Actions cron uses UTC. 01:00 UTC is 09:00 in Beijing.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only generate the report, do not push to pushplus"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Shanghai
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
      AI_MODEL: ${{ secrets.AI_MODEL }}
      FORCE_RULE_BASED: ${{ vars.FORCE_RULE_BASED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Build and send report
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python -m github_trending_pushplus.main $ARGS

      - name: Upload latest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-report
          path: latest_report.html
          if-no-files-found: ignore
